{% extends "base.html" %}

{% block title %}Login / Register - Knee Osteoarthritis{% endblock %}

{% block content %}
<section class="department_section layout_padding pt-5">
  <div class="container" style="max-width: 600px;">
    <div class="heading_container heading_center mb-4">
      <h2>Account Login</h2>
    </div>

    <div class="card shadow-sm border-0 p-4" style="border-radius: 15px;">
      <ul class="nav nav-tabs nav-fill mb-4" id="myTab" role="tablist">
        <li class="nav-item">
          <a class="nav-link active" id="login-tab" data-toggle="tab" href="#login" role="tab">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="register-tab" data-toggle="tab" href="#register" role="tab">Register</a>
        </li>
      </ul>

      <div class="tab-content" id="myTabContent">
        <!-- Login Form -->
        <div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="login-tab">
          <form action="{{ url_for('auth.login') }}" method="POST">
            <input type="hidden" name="action" value="login">
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-4" style="border-radius: 20px;">Secure Login</button>
          </form>
        </div>

        <!-- Register Form -->
        <div class="tab-pane fade" id="register" role="tabpanel" aria-labelledby="register-tab">
          <form action="{{ url_for('auth.login') }}" method="POST">
            <input type="hidden" name="action" value="register">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" name="name" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success btn-block mt-4" style="border-radius: 20px;">Create Account</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
